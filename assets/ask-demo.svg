<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <style>
    .bg       { fill: #0f1117; }
    .chrome   { fill: #1a1d25; }
    .stroke   { stroke: #2a2d35; stroke-width: 1; }
    .title    { fill: #8b8f9a; font-size: 12px; }
    text      { font-size: 14px; fill: #e6e8eb; white-space: pre; }
    .prompt   { fill: #a78bfa; font-weight: 600; }
    .ask      { fill: #60a5fa; font-weight: 600; }
    .muted    { fill: #6b7280; }
    .comment  { fill: #7c7f8a; font-style: italic; }
    .kw       { fill: #f472b6; font-weight: 600; }
    .id       { fill: #fcd34d; }
    .ok       { fill: #34d399; }
    .warn     { fill: #fb923c; }
    .rule     { fill: #3a3d45; }
    .cta      { fill: #f59e0b; font-weight: 600; }
    .cursor   { fill: #a78bfa; }
    .line     { opacity: 0; }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="600" rx="8"/>
  <rect class="chrome stroke" x="0" y="0" width="900" height="32" rx="8"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#27c93f"/>
  <text class="title" x="450" y="20" text-anchor="middle">slothdb — .ask (natural language → SQL)</text>

  <g transform="translate(24, 62)">

    <!-- Interaction 1 -->
    <g class="line">
      <text x="0" y="0"><tspan class="prompt">slothdb&gt; </tspan><tspan class="ask">.ask</tspan> how many sales</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="22"><tspan class="comment">-- generated: </tspan><tspan class="kw">SELECT COUNT</tspan>(*) <tspan class="kw">FROM </tspan><tspan class="id">"sales"</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="44"><tspan class="muted">Run? [Y/n] </tspan>y</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text class="ok" x="0" y="66">6</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
    </g>

    <!-- Interaction 2 -->
    <g class="line">
      <text x="0" y="106"><tspan class="prompt">slothdb&gt; </tspan><tspan class="ask">.ask</tspan> total amount per region</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="128"><tspan class="comment">-- generated: </tspan><tspan class="kw">SELECT </tspan><tspan class="id">"region"</tspan>, <tspan class="kw">SUM</tspan>(<tspan class="id">"amount"</tspan>) <tspan class="kw">FROM </tspan><tspan class="id">"sales" </tspan><tspan class="kw">GROUP BY </tspan><tspan class="id">"region"</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="150"><tspan class="muted">Run? [Y/n] </tspan>y</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="172">EMEA   1000.00</text>
      <text x="0" y="190">APAC    425.00</text>
      <text x="0" y="208">AMER    450.00</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.25s" fill="freeze"/>
    </g>

    <!-- Interaction 3 — year filter -->
    <g class="line">
      <text x="0" y="248"><tspan class="prompt">slothdb&gt; </tspan><tspan class="ask">.ask</tspan> average amount in 2024</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="270"><tspan class="comment">-- generated: </tspan><tspan class="kw">SELECT AVG</tspan>(<tspan class="id">"amount"</tspan>) <tspan class="kw">FROM </tspan><tspan class="id">"sales" </tspan><tspan class="kw">WHERE </tspan><tspan class="id">"order_date" </tspan><tspan class="kw">LIKE </tspan>'2024%'</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="292"><tspan class="muted">Run? [Y/n] </tspan>y</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text class="ok" x="0" y="314">285.00</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.2s" fill="freeze"/>
    </g>

    <!-- Interaction 4 — refusal -->
    <g class="line">
      <text x="0" y="354"><tspan class="prompt">slothdb&gt; </tspan><tspan class="ask">.ask</tspan> which month had the most loyal repeat buyers</text>
      <animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text class="warn" x="0" y="376">Could not translate: no pattern matched.</text>
      <animate attributeName="opacity" from="0" to="1" begin="6.7s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text class="muted" x="0" y="398">Try: 'how many X', 'total X per Y', 'top N X by Y', 'latest X', 'average X in YYYY'.</text>
      <animate attributeName="opacity" from="0" to="1" begin="6.9s" dur="0.2s" fill="freeze"/>
    </g>

    <!-- Footer -->
    <g class="line">
      <text class="rule" x="0" y="438">============================================================</text>
      <animate attributeName="opacity" from="0" to="1" begin="7.4s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="460"><tspan class="cta">No model weights.  </tspan>No network.  Pure C++ rules.  <tspan class="ok">50 KB.</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="7.6s" dur="0.3s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="482"><tspan class="cta">Liked it? </tspan>Star the repo: github.com/SouravRoy-ETL/slothdb</text>
      <animate attributeName="opacity" from="0" to="1" begin="7.9s" dur="0.3s" fill="freeze"/>
    </g>

    <!-- Cursor -->
    <g>
      <text x="0" y="520"><tspan class="prompt">slothdb&gt; </tspan><tspan class="cursor">▋<animate attributeName="opacity" values="1;0;1" dur="1s" begin="8.4s" repeatCount="indefinite"/></tspan></text>
    </g>

  </g>
</svg>
