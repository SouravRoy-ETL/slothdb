<svg xmlns="http://www.w3.org/2000/svg" width="380" height="72" viewBox="0 0 380 72" role="img" aria-label="Join the SlothDB Discord">
  <defs>
    <linearGradient id="btnbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#4752C4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="s_bg" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0"   stop-color="#9275F0"/>
      <stop offset="0.6" stop-color="#7C5CE6"/>
      <stop offset="1"   stop-color="#5B3FCF"/>
    </radialGradient>
    <linearGradient id="s_fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5C9A1"/>
      <stop offset="1" stop-color="#B68F62"/>
    </linearGradient>
    <linearGradient id="s_face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4DDB9"/>
      <stop offset="1" stop-color="#E5C9A1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Button background -->
  <rect x="2" y="2" width="376" height="68" rx="16" ry="16" fill="url(#btnbg)" filter="url(#shadow)"/>
  <rect x="2" y="2" width="376" height="34" rx="16" ry="16" fill="url(#sheen)"/>

  <!-- SlothDB mascot. 56x56, vertically centred at y=8 (top) to y=64 (bottom). -->
  <g transform="translate(10 8) scale(0.109375)">
    <circle cx="256" cy="256" r="256" fill="url(#s_bg)"/>
    <circle cx="256" cy="256" r="244" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
    <ellipse cx="256" cy="270" rx="170" ry="160" fill="url(#s_fur)"/>
    <ellipse cx="118" cy="190" rx="34" ry="42" fill="url(#s_fur)" transform="rotate(-18 118 190)"/>
    <ellipse cx="394" cy="190" rx="34" ry="42" fill="url(#s_fur)" transform="rotate(18 394 190)"/>
    <ellipse cx="256" cy="282" rx="138" ry="132" fill="url(#s_face)"/>
    <ellipse cx="200" cy="262" rx="42" ry="34" fill="#3D2817" transform="rotate(-12 200 262)"/>
    <ellipse cx="312" cy="262" rx="42" ry="34" fill="#3D2817" transform="rotate(12 312 262)"/>
    <path d="M 168 262 Q 200 248, 232 262" stroke="#1A0F08" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 280 262 Q 312 248, 344 262" stroke="#1A0F08" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="200" cy="265" r="2.5" fill="#1A0F08"/>
    <circle cx="312" cy="265" r="2.5" fill="#1A0F08"/>
    <path d="M 248 322 L 264 322 L 256 336 Z" fill="#3D2817"/>
    <ellipse cx="256" cy="322" rx="11" ry="6" fill="#3D2817"/>
    <path d="M 232 358 Q 256 372, 280 358" stroke="#3D2817" stroke-width="5" stroke-linecap="round" fill="none"/>
    <ellipse cx="170" cy="328" rx="14" ry="8" fill="#E8A88E" opacity="0.4"/>
    <ellipse cx="342" cy="328" rx="14" ry="8" fill="#E8A88E" opacity="0.4"/>
  </g>

  <!-- Text. Two-line block visually centred against the 56px mascot:
       'JOIN THE' baseline at y=30, 'SlothDB Discord' baseline at y=52,
       gives a vertical midpoint of y=36 which matches the button centre. -->
  <text x="80" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" letter-spacing="1">JOIN THE</text>
  <text x="80" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">SlothDB Discord</text>

  <!-- Right arrow, vertically centred on the button (y=36). -->
  <g transform="translate(338 30)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 6 L 14 6"/>
    <path d="M 9 1 L 14 6 L 9 11"/>
  </g>
</svg>
