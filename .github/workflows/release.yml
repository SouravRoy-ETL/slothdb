name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -B build -DSLOTHDB_BUILD_SHELL=ON
        cmake --build build --config Release
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-windows-x64
        path: build/src/Release/slothdb.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-linux-x64
        path: build/src/slothdb

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j$(sysctl -n hw.ncpu)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-macos
        path: build/src/slothdb

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          slothdb-windows-x64/slothdb.exe
          slothdb-linux-x64/slothdb
          slothdb-macos/slothdb
        generate_release_notes: true
