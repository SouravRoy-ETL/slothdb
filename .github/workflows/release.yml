name: Release

on:
  push:
    tags: [ 'v*' ]
  # Manual trigger for backfilling artifacts on a tag that already exists
  # (e.g. after a release was created manually without CI). Pass the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build artifacts for (e.g. v0.1.5)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}
        submodules: recursive
    - name: Build
      run: |
        cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DSLOTHDB_ASK_MODEL=ON -DSLOTHDB_BUILD_TESTS=OFF
        cmake --build build --config Release -j
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-windows-x64
        path: build/src/Release/slothdb.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}
        submodules: recursive
    - name: Derive version from tag
      id: ver
      run: |
        TAG="${{ github.event.inputs.tag || github.ref_name }}"
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Building version: $VERSION"
    - name: Build
      run: |
        cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DSLOTHDB_ASK_MODEL=ON -DSLOTHDB_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j$(nproc)
        strip build/src/slothdb
    - name: Build .deb package
      run: |
        VERSION="${{ steps.ver.outputs.version }}"
        mkdir -p pkg/DEBIAN pkg/usr/local/bin pkg/usr/share/doc/slothdb
        cp build/src/slothdb pkg/usr/local/bin/
        cp README.md LICENSE pkg/usr/share/doc/slothdb/
        cat > pkg/DEBIAN/control << EOF
        Package: slothdb
        Version: ${VERSION}
        Section: database
        Priority: optional
        Architecture: amd64
        Depends: libc6 (>= 2.31)
        Maintainer: Sourav Roy <souravroy7864@gmail.com>
        Description: Fast in-process SQL OLAP database
         Reads Parquet, CSV, JSON, Avro, Arrow, SQLite, and Excel
         directly from SQL. Zero dependencies. MIT licensed.
        Homepage: https://github.com/SouravRoy-ETL/slothdb
        EOF
        sed -i 's/^        //' pkg/DEBIAN/control
        dpkg-deb --build pkg "slothdb_${VERSION}_amd64.deb"
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-linux-x64
        path: build/src/slothdb
    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-deb
        path: slothdb_${{ steps.ver.outputs.version }}_amd64.deb

  build-macos:
    # macos-14 is the Apple Silicon hosted runner with reliable capacity.
    # macos-13 (Intel-only) hosted runners queue indefinitely and routinely
    # never get scheduled, so we cross-build universal2 on macos-14: the
    # x86_64 slice keeps -mavx2 (CMake adds it only when the slice is x86),
    # and the resulting binary runs natively on both arm64 and x86_64 Macs.
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}
        submodules: recursive
    - name: Build
      run: |
        cmake -B build \
          -DSLOTHDB_BUILD_SHELL=ON -DSLOTHDB_ASK_MODEL=ON \
          -DSLOTHDB_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
        cmake --build build -j$(sysctl -n hw.ncpu)
        lipo -info build/src/slothdb
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: slothdb-macos
        path: build/src/slothdb

  # Windows + Linux assets attach as soon as those builds finish. macOS is
  # handled by a separate job so the slow, queue-prone Intel runner never
  # blocks the release.
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
    - name: Derive version
      id: ver
      run: |
        TAG="${{ github.event.inputs.tag || github.ref_name }}"
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
    # Rename the Linux binary so it has a distinct, platform-tagged
    # filename when attached to the GitHub Release.
    - name: Rename Linux binary
      run: mv slothdb-linux-x64/slothdb slothdb-linux-x64/slothdb-linux-x64
    # Delete any pre-existing assets of the same name so a re-run of this
    # workflow on an existing tag (workflow_dispatch) replaces stale
    # binaries rather than silently keeping them.
    - name: Remove stale assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.ver.outputs.tag }}"
        VERSION="${{ steps.ver.outputs.version }}"
        for asset in slothdb.exe slothdb-linux-x64 "slothdb_${VERSION}_amd64.deb"; do
          gh release delete-asset "$TAG" "$asset" --yes --repo "$GITHUB_REPOSITORY" || true
        done
    - name: Attach to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag }}
        files: |
          slothdb-windows-x64/slothdb.exe
          slothdb-linux-x64/slothdb-linux-x64
          slothdb-deb/slothdb_${{ steps.ver.outputs.version }}_amd64.deb
        # Don't overwrite the hand-written release notes, only attach files.
        fail_on_unmatched_files: true

  # macOS binary attaches on its own track. The macos-13 Intel runner can
  # sit in a long queue; this keeps that off the Windows / Linux critical
  # path. If build-macos fails or is cancelled, this job is skipped.
  attach-macos:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: slothdb-macos
    - name: Derive tag
      id: ver
      run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
    - name: Rename binary
      run: mv slothdb slothdb-macos
    - name: Remove stale asset
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete-asset "${{ steps.ver.outputs.tag }}" slothdb-macos --yes --repo "$GITHUB_REPOSITORY" || true
    - name: Attach to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.tag }}
        files: slothdb-macos
        fail_on_unmatched_files: true
