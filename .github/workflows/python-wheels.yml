name: Python wheels

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build wheels for (e.g. v0.1.8)'
        required: true
        type: string
      publish:
        description: 'Publish to PyPI after building'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build wheel (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: win_amd64,            platform: win_amd64 }
          # Linux must be tagged manylinux2014, not linux_x86_64 - PyPI
          # rejects bare linux_* tags because they don't say which glibc.
          - { os: ubuntu-24.04,   name: manylinux2014_x86_64, platform: manylinux2014_x86_64 }
          # Single universal2 wheel covers both Intel and Apple Silicon
          # in one artifact. The macos-13 (Intel-only) GitHub-hosted
          # runners have unreliable capacity and routinely queue
          # indefinitely, so we cross-build on macos-14 instead.
          - { os: macos-14,       name: macosx_universal2,    platform: macosx-11.0-universal2 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: false
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      # Linux: build inside a manylinux2014 container so the .so links
      # against an old enough glibc to install on most distros.
      - name: Build shared lib (Linux manylinux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD":/io -w /io quay.io/pypa/manylinux2014_x86_64 bash -c '
            yum install -y cmake3 gcc-c++ make &&
            cmake3 -B build -DSLOTHDB_BUILD_SHARED=ON -DSLOTHDB_BUILD_SHELL=OFF -DSLOTHDB_BUILD_TESTS=OFF -DSLOTHDB_ASK_MODEL=OFF -DCMAKE_BUILD_TYPE=Release &&
            cmake3 --build build -j$(nproc) --target slothdb_shared &&
            cp build/src/libslothdb.so python/slothdb/ &&
            strip python/slothdb/libslothdb.so
          '

      - name: Build shared lib (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -B build -DSLOTHDB_BUILD_SHARED=ON -DSLOTHDB_BUILD_SHELL=OFF -DSLOTHDB_BUILD_TESTS=OFF -DSLOTHDB_ASK_MODEL=OFF
          cmake --build build --config Release -j --target slothdb_shared
          cp build/src/Release/slothdb.dll python/slothdb/

      - name: Build shared lib (macOS, universal2)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DSLOTHDB_BUILD_SHARED=ON -DSLOTHDB_BUILD_SHELL=OFF \
            -DSLOTHDB_BUILD_TESTS=OFF -DSLOTHDB_ASK_MODEL=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build build -j$(sysctl -n hw.ncpu) --target slothdb_shared
          # Confirm the dylib has both slices.
          lipo -info build/src/libslothdb.dylib
          cp build/src/libslothdb.dylib python/slothdb/

      - name: Build wheel
        shell: bash
        env:
          # Force the wheel platform tag explicitly per matrix row so
          # we get manylinux2014_x86_64 (not linux_x86_64, which PyPI
          # rejects) on Linux, win_amd64 on Windows, and the universal2
          # tag on macOS. Wheel converts the dashes to underscores in
          # the filename automatically.
          _PYTHON_HOST_PLATFORM: ${{ matrix.platform }}
          ARCHFLAGS: ${{ runner.os == 'macOS' && '-arch x86_64 -arch arm64' || '' }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel python/

      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall python/dist/*.whl
          python -c "import slothdb; db = slothdb.connect(); r = db.sql('SELECT 42 AS answer'); r.show()"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: python/dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist python/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    # Manual publishes only. Tag pushes still trigger the build + sdist
    # jobs above (so the artifacts are exercised), but the upload to PyPI
    # only runs when workflow_dispatch is invoked with publish: true.
    # Run the workflow from the Actions tab and tick "Publish to PyPI".
    if: github.event.inputs.publish == 'true'
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted publishing (PyPI OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all
      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find dist-all -name '*.whl' -o -name '*.tar.gz' | xargs -I{} cp {} dist/
          ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
