name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -DSLOTHDB_BUILD_SHELL=ON
    - name: Build
      run: cmake --build build --config Release
    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure

  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=20
    - name: Build
      run: cmake --build build -j$(nproc)
    - name: Test
      run: ctest --test-dir build --output-on-failure

  build-macos:
    # macos-13 is the x86_64 runner; SlothDB targets x86-64 (the analytics
    # core uses AVX2/BMI2 intrinsics). macos-14+ is Apple Silicon.
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -DSLOTHDB_BUILD_SHELL=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=20
    - name: Build
      run: cmake --build build -j$(sysctl -n hw.ncpu)
    - name: Test
      run: ctest --test-dir build --output-on-failure
