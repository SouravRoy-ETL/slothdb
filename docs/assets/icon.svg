<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- SlothDB mark v2.
       Cleaner, more iconic: sloth face only, no body, no branch. Sleepy
       half-closed eyes (the actual sloth signature) + smaller, separated
       eye-patches read clearly at favicon size. Round avatar background
       so it works as a profile picture without clipping. -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0"   stop-color="#9275F0"/>
      <stop offset="0.6" stop-color="#7C5CE6"/>
      <stop offset="1"   stop-color="#5B3FCF"/>
    </radialGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5C9A1"/>
      <stop offset="1" stop-color="#B68F62"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4DDB9"/>
      <stop offset="1" stop-color="#E5C9A1"/>
    </linearGradient>
  </defs>

  <!-- Background — circle so it survives LinkedIn / Slack / GitHub
       avatar cropping without clipping the rounded-square corners. -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle inner ring for depth (very faint). -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Outer fur silhouette — slightly larger than the face plate so the
       face reads as set into a fur ring. -->
  <ellipse cx="256" cy="270" rx="170" ry="160" fill="url(#fur)"/>

  <!-- Two soft ear bumps (subtle — not pointy, more like fur tufts). -->
  <ellipse cx="118" cy="190" rx="34" ry="42" fill="url(#fur)" transform="rotate(-18 118 190)"/>
  <ellipse cx="394" cy="190" rx="34" ry="42" fill="url(#fur)" transform="rotate(18 394 190)"/>

  <!-- Face plate — lighter, larger relative to head, gives a clear oval
       canvas for the eye markings. -->
  <ellipse cx="256" cy="282" rx="138" ry="132" fill="url(#face)"/>

  <!-- Eye-mask markings — two SEPARATED almond shapes, not the joined
       butterfly from v1. Real sloths have distinct dark patches around
       each eye. This reads cleaner at every size. -->
  <ellipse cx="200" cy="262" rx="42" ry="34" fill="#3D2817" transform="rotate(-12 200 262)"/>
  <ellipse cx="312" cy="262" rx="42" ry="34" fill="#3D2817" transform="rotate(12 312 262)"/>

  <!-- Sleepy half-closed eyes — the trademark sloth expression.
       Drawn as a thick arc (closed eyelid) over a tiny visible eye-glint. -->
  <path d="M 168 262 Q 200 248, 232 262" stroke="#1A0F08" stroke-width="6"
        stroke-linecap="round" fill="none"/>
  <path d="M 280 262 Q 312 248, 344 262" stroke="#1A0F08" stroke-width="6"
        stroke-linecap="round" fill="none"/>
  <!-- Tiny eye glints under the closed lids. -->
  <circle cx="200" cy="265" r="2.5" fill="#1A0F08"/>
  <circle cx="312" cy="265" r="2.5" fill="#1A0F08"/>

  <!-- Nose — small triangular, centred. -->
  <path d="M 248 322 L 264 322 L 256 336 Z" fill="#3D2817"/>
  <ellipse cx="256" cy="322" rx="11" ry="6" fill="#3D2817"/>

  <!-- Mouth — gentle smile, slightly upturned. -->
  <path d="M 232 358 Q 256 372, 280 358" stroke="#3D2817" stroke-width="5"
        stroke-linecap="round" fill="none"/>

  <!-- Cheek warmth (very subtle). -->
  <ellipse cx="170" cy="328" rx="14" ry="8" fill="#E8A88E" opacity="0.4"/>
  <ellipse cx="342" cy="328" rx="14" ry="8" fill="#E8A88E" opacity="0.4"/>
</svg>
