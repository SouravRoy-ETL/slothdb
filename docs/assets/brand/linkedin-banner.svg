<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Rich LinkedIn personal banner: mascot + wordmark + value prop + proof. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1240"/>
      <stop offset="0.55" stop-color="#0F0A2A"/>
      <stop offset="1" stop-color="#1A1240"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CE6"/>
      <stop offset="1" stop-color="#5B3FCF"/>
    </linearGradient>
    <linearGradient id="purpleLite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C5CE6"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9B98F"/>
      <stop offset="1" stop-color="#B68F62"/>
    </linearGradient>
  </defs>

  <!-- Background. -->
  <rect x="0" y="0" width="1584" height="396" fill="url(#bg)"/>

  <!-- Decorative dot grid (subtle texture, top-right). -->
  <g fill="#7C5CE6" opacity="0.08">
    <circle cx="1480" cy="40"  r="2"/><circle cx="1510" cy="40"  r="2"/><circle cx="1540" cy="40"  r="2"/><circle cx="1570" cy="40"  r="2"/>
    <circle cx="1480" cy="70"  r="2"/><circle cx="1510" cy="70"  r="2"/><circle cx="1540" cy="70"  r="2"/><circle cx="1570" cy="70"  r="2"/>
    <circle cx="1480" cy="100" r="2"/><circle cx="1510" cy="100" r="2"/><circle cx="1540" cy="100" r="2"/><circle cx="1570" cy="100" r="2"/>
    <circle cx="1480" cy="130" r="2"/><circle cx="1510" cy="130" r="2"/><circle cx="1540" cy="130" r="2"/>
    <circle cx="1480" cy="160" r="2"/><circle cx="1510" cy="160" r="2"/>
  </g>

  <!-- Mascot (left). -->
  <g transform="translate(50, 40) scale(0.62)">
    <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#purple)"/>
    <rect x="56" y="92" width="400" height="22" rx="11" fill="#3D2817" opacity="0.85"/>
    <ellipse cx="100" cy="103" rx="18" ry="6" fill="#5C3D26" opacity="0.6"/>
    <path d="M 320 110 C 340 90, 360 100, 360 130 L 348 200 C 348 215, 332 215, 328 200 Z" fill="url(#fur)"/>
    <path d="M 192 110 C 172 90, 152 100, 152 130 L 164 200 C 164 215, 180 215, 184 200 Z" fill="url(#fur)"/>
    <ellipse cx="256" cy="290" rx="120" ry="140" fill="url(#fur)"/>
    <ellipse cx="256" cy="320" rx="92" ry="100" fill="#EBD3AE"/>
    <path d="M 188 300 Q 188 268, 222 268 Q 256 268, 256 300 Q 256 268, 290 268 Q 324 268, 324 300 Q 324 348, 290 348 Q 256 348, 256 320 Q 256 348, 222 348 Q 188 348, 188 300 Z" fill="#3D2817"/>
    <circle cx="222" cy="304" r="11" fill="#FFFFFF"/>
    <circle cx="290" cy="304" r="11" fill="#FFFFFF"/>
    <circle cx="225" cy="306" r="5.5" fill="#1A0F08"/>
    <circle cx="293" cy="306" r="5.5" fill="#1A0F08"/>
    <ellipse cx="256" cy="358" rx="9" ry="6" fill="#3D2817"/>
    <path d="M 240 384 Q 256 396, 272 384" stroke="#3D2817" stroke-width="5" stroke-linecap="round" fill="none"/>
    <ellipse cx="200" cy="354" rx="10" ry="6" fill="#E8A88E" opacity="0.5"/>
    <ellipse cx="312" cy="354" rx="10" ry="6" fill="#E8A88E" opacity="0.5"/>
    <path d="M 432 92 Q 460 70, 478 80 Q 470 100, 442 105 Q 432 100, 432 92 Z" fill="#6BBF59"/>
    <path d="M 442 92 L 470 82" stroke="#3A7A2E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline. -->
  <text x="430" y="170"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="120" font-weight="800" fill="#FFFFFF" letter-spacing="-3">
    Sloth<tspan fill="url(#purpleLite)">DB</tspan>
  </text>
  <text x="434" y="222"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="32" font-weight="500" fill="#C4BEDD" letter-spacing="0.3">
    Run analytics faster — embedded SQL OLAP, in-process.
  </text>
  <text x="434" y="262"
        font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace"
        font-size="22" font-weight="500" fill="#7C5CE6" letter-spacing="0.5">
    slothdb.org · pip install slothdb · npm i @slothdb/wasm
  </text>

  <!-- Stat strip (bottom, full width below the title block). -->
  <g transform="translate(434, 300)">
    <!-- Stat 1 -->
    <text x="0" y="30"
          font-family="system-ui, sans-serif" font-size="36" font-weight="800"
          fill="url(#purpleLite)" letter-spacing="-0.5">5×</text>
    <text x="0" y="60"
          font-family="system-ui, sans-serif" font-size="14" font-weight="500"
          fill="#A8A1C9" letter-spacing="0.3">faster than DuckDB</text>

    <!-- Stat 2 -->
    <text x="180" y="30"
          font-family="system-ui, sans-serif" font-size="36" font-weight="800"
          fill="url(#purpleLite)" letter-spacing="-0.5">138 ms</text>
    <text x="180" y="60"
          font-family="system-ui, sans-serif" font-size="14" font-weight="500"
          fill="#A8A1C9" letter-spacing="0.3">5-query warm batch</text>

    <!-- Stat 3 -->
    <text x="380" y="30"
          font-family="system-ui, sans-serif" font-size="36" font-weight="800"
          fill="url(#purpleLite)" letter-spacing="-0.5">1.3 MB</text>
    <text x="380" y="60"
          font-family="system-ui, sans-serif" font-size="14" font-weight="500"
          fill="#A8A1C9" letter-spacing="0.3">WASM in the browser</text>

    <!-- Stat 4 -->
    <text x="600" y="30"
          font-family="system-ui, sans-serif" font-size="36" font-weight="800"
          fill="url(#purpleLite)" letter-spacing="-0.5">7</text>
    <text x="600" y="60"
          font-family="system-ui, sans-serif" font-size="14" font-weight="500"
          fill="#A8A1C9" letter-spacing="0.3">file formats, no import</text>
  </g>

  <!-- File-format chips (top-right, value cue without overflowing). -->
  <g transform="translate(1000, 60)" font-family="ui-monospace, 'Cascadia Mono', Menlo, monospace" font-size="14" font-weight="600">
    <g>
      <rect x="0"   y="0" width="80"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="40"  y="21" text-anchor="middle" fill="#C4BEDD">Parquet</text>
    </g>
    <g>
      <rect x="92"  y="0" width="60"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="122" y="21" text-anchor="middle" fill="#C4BEDD">CSV</text>
    </g>
    <g>
      <rect x="164" y="0" width="64"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="196" y="21" text-anchor="middle" fill="#C4BEDD">JSON</text>
    </g>
    <g>
      <rect x="240" y="0" width="64"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="272" y="21" text-anchor="middle" fill="#C4BEDD">Avro</text>
    </g>
    <g>
      <rect x="316" y="0" width="68"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="350" y="21" text-anchor="middle" fill="#C4BEDD">Arrow</text>
    </g>
    <g>
      <rect x="396" y="0" width="80"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="436" y="21" text-anchor="middle" fill="#C4BEDD">SQLite</text>
    </g>
    <g>
      <rect x="488" y="0" width="68"  height="32" rx="16" fill="#1F1647" stroke="#3A2D78" stroke-width="1"/>
      <text x="522" y="21" text-anchor="middle" fill="#C4BEDD">Excel</text>
    </g>
  </g>

  <!-- Bottom-right MIT badge. -->
  <g transform="translate(1452, 340)">
    <rect x="0" y="0" width="92" height="28" rx="14" fill="#1F1647" stroke="#3A2D78"/>
    <text x="46" y="19" text-anchor="middle"
          font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#A78BFA">MIT licensed</text>
  </g>
</svg>
