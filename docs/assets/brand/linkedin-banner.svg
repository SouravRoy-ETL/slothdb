<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- LinkedIn banner: solid brand-purple field with a faint floating
       DuckDB-style pipe-syntax SQL query as the watermark texture. No
       wordmark, no stats, no logo — those live in the profile picture
       and About fields above/below the banner. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#7C5CE6"/>
      <stop offset="0.5" stop-color="#8B6CF0"/>
      <stop offset="1"   stop-color="#7C5CE6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1584" height="396" fill="url(#bg)"/>

  <!-- Floating pipe-syntax query, scattered like the DuckDB hero backdrop. -->
  <g font-family="ui-monospace, 'Cascadia Mono', 'Fira Code', Consolas, monospace"
     font-weight="500" fill="#FFFFFF" opacity="0.20" font-size="20"
     letter-spacing="0.5">
    <text x="80"   y="80">FROM 'sales.parquet'</text>
    <text x="120"  y="120">|&gt; WHERE region = 'US'</text>
    <text x="900"  y="80">|&gt; GROUP BY product</text>
    <text x="940"  y="120">|&gt; SELECT product, SUM(revenue) AS total</text>
    <text x="120"  y="280">|&gt; ORDER BY total DESC</text>
    <text x="160"  y="320">|&gt; LIMIT 10</text>
  </g>

  <!-- Highlighted keyword run (slightly more visible) for visual rhythm. -->
  <g font-family="ui-monospace, 'Cascadia Mono', 'Fira Code', Consolas, monospace"
     font-weight="700" fill="#FFFFFF" opacity="0.32" font-size="20"
     letter-spacing="0.5">
    <text x="80"   y="80">FROM</text>
    <text x="120"  y="120">|&gt; WHERE</text>
    <text x="900"  y="80">|&gt; GROUP BY</text>
    <text x="940"  y="120">|&gt; SELECT</text>
    <text x="120"  y="280">|&gt; ORDER BY</text>
    <text x="160"  y="320">|&gt; LIMIT</text>
  </g>

  <!-- Subtle horizontal flow lines connecting the query lines, very faint. -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.10">
    <path d="M 80 100 Q 500 90, 900 100"/>
    <path d="M 120 140 Q 540 145, 940 140"/>
    <path d="M 940 160 Q 600 200, 120 260"/>
    <path d="M 120 300 Q 200 320, 160 340"/>
  </g>

  <!-- A few small node dots on the flow paths. -->
  <g fill="#FFFFFF" opacity="0.30">
    <circle cx="500"  cy="92"  r="3"/>
    <circle cx="540"  cy="142" r="3"/>
    <circle cx="600"  cy="200" r="3"/>
    <circle cx="200"  cy="318" r="3"/>
  </g>
</svg>
