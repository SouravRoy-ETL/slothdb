<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Minimalistic LinkedIn banner — DuckDB-style.
       Solid brand-color field with subtle data-flow pattern. No text,
       no stats, no logo. The mascot lives in the profile-picture slot
       above the banner, so the banner just sets the brand colour. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#7C5CE6"/>
      <stop offset="0.5" stop-color="#8B6CF0"/>
      <stop offset="1"   stop-color="#7C5CE6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1584" height="396" fill="url(#bg)"/>

  <!-- Faint flow paths suggesting data movement. Same idea as DuckDB's
       yellow banner has subtle yellow flow lines — keep it whisper-quiet
       so the profile picture overlay reads cleanly on top. -->
  <g fill="none" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round">
    <path d="M -50 90 Q 300 60, 600 110 T 1200 90 T 1700 110"/>
    <path d="M -50 160 Q 250 200, 500 170 T 1000 200 T 1700 175"/>
    <path d="M -50 230 Q 320 210, 660 250 T 1280 230 T 1700 250"/>
    <path d="M -50 305 Q 280 340, 580 305 T 1100 335 T 1700 305"/>
  </g>

  <!-- Tiny node dots on the flow paths, like packet markers. -->
  <g fill="#A78BFA" opacity="0.35">
    <circle cx="180"  cy="98"  r="3"/>
    <circle cx="420"  cy="86"  r="3"/>
    <circle cx="760"  cy="105" r="3"/>
    <circle cx="1100" cy="92"  r="3"/>
    <circle cx="1380" cy="100" r="3"/>

    <circle cx="240"  cy="188" r="3"/>
    <circle cx="540"  cy="178" r="3"/>
    <circle cx="880"  cy="195" r="3"/>
    <circle cx="1240" cy="185" r="3"/>

    <circle cx="160"  cy="222" r="3"/>
    <circle cx="500"  cy="240" r="3"/>
    <circle cx="820"  cy="248" r="3"/>
    <circle cx="1180" cy="232" r="3"/>
    <circle cx="1460" cy="245" r="3"/>

    <circle cx="220"  cy="328" r="3"/>
    <circle cx="600"  cy="312" r="3"/>
    <circle cx="940"  cy="320" r="3"/>
    <circle cx="1320" cy="328" r="3"/>
  </g>
</svg>
