<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- SlothDB brand mark.
       DuckDB-style: solid shapes, single readable silhouette, friendly mascot.
       The sloth's distinctive dark eye-mask is the recognisable feature here. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CE6"/>
      <stop offset="1" stop-color="#5B3FCF"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D9B98F"/>
      <stop offset="1" stop-color="#B68F62"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background (DuckDB's logo also sits in a tile shape). -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Branch the sloth hangs from. -->
  <rect x="56" y="92" width="400" height="22" rx="11" fill="#3D2817" opacity="0.85"/>
  <ellipse cx="100" cy="103" rx="18" ry="6" fill="#5C3D26" opacity="0.6"/>

  <!-- Right arm (slung over the branch). -->
  <path d="M 320 110 C 340 90, 360 100, 360 130 L 348 200 C 348 215, 332 215, 328 200 Z"
        fill="url(#fur)"/>

  <!-- Left arm. -->
  <path d="M 192 110 C 172 90, 152 100, 152 130 L 164 200 C 164 215, 180 215, 184 200 Z"
        fill="url(#fur)"/>

  <!-- Body/head capsule — single shape so the silhouette reads at 16px. -->
  <ellipse cx="256" cy="290" rx="120" ry="140" fill="url(#fur)"/>

  <!-- Inner face — slightly lighter, gives the round face plate. -->
  <ellipse cx="256" cy="320" rx="92" ry="100" fill="#EBD3AE"/>

  <!-- The sloth's signature dark eye-mask (the brand-defining feature). -->
  <path d="M 188 300
           Q 188 268, 222 268
           Q 256 268, 256 300
           Q 256 268, 290 268
           Q 324 268, 324 300
           Q 324 348, 290 348
           Q 256 348, 256 320
           Q 256 348, 222 348
           Q 188 348, 188 300 Z"
        fill="#3D2817"/>

  <!-- Eyes (white + pupil) — closed-ish sleepy slits would be cuter but
       open eyes read better at favicon size. -->
  <circle cx="222" cy="304" r="11" fill="#FFFFFF"/>
  <circle cx="290" cy="304" r="11" fill="#FFFFFF"/>
  <circle cx="225" cy="306" r="5.5" fill="#1A0F08"/>
  <circle cx="293" cy="306" r="5.5" fill="#1A0F08"/>

  <!-- Nose. -->
  <path d="M 246 360 Q 256 374, 266 360 Q 256 372, 246 360 Z" fill="#3D2817"/>
  <ellipse cx="256" cy="358" rx="9" ry="6" fill="#3D2817"/>

  <!-- Mouth — gentle smile. -->
  <path d="M 240 384 Q 256 396, 272 384" stroke="#3D2817" stroke-width="5"
        stroke-linecap="round" fill="none"/>

  <!-- Cheek blush (warmth). -->
  <ellipse cx="200" cy="354" rx="10" ry="6" fill="#E8A88E" opacity="0.5"/>
  <ellipse cx="312" cy="354" rx="10" ry="6" fill="#E8A88E" opacity="0.5"/>

  <!-- Tiny leaf accent on the branch — the SlothDB-not-DuckDB tell. -->
  <path d="M 432 92
           Q 460 70, 478 80
           Q 470 100, 442 105
           Q 432 100, 432 92 Z"
        fill="#6BBF59"/>
  <path d="M 442 92 L 470 82" stroke="#3A7A2E" stroke-width="2" stroke-linecap="round"/>
</svg>
