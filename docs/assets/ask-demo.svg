<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <style>
    .bg       { fill: #0f1117; }
    .chrome   { fill: #1a1d25; }
    .stroke   { stroke: #2a2d35; stroke-width: 1; }
    .title    { fill: #8b8f9a; font-size: 12px; }
    text      { font-size: 14px; fill: #e6e8eb; white-space: pre; }
    .prompt   { fill: #a78bfa; font-weight: 600; }
    .askprompt{ fill: #60a5fa; font-weight: 600; }
    .cmd      { fill: #60a5fa; font-weight: 600; }
    .muted    { fill: #6b7280; }
    .comment  { fill: #7c7f8a; font-style: italic; }
    .kw       { fill: #f472b6; font-weight: 600; }
    .id       { fill: #fcd34d; }
    .str      { fill: #86efac; }
    .ok       { fill: #34d399; }
    .badge    { fill: #34d399; font-size: 11px; font-weight: 700; }
    .badge2   { fill: #a78bfa; font-size: 11px; font-weight: 700; }
    .badge3   { fill: #fb923c; font-size: 11px; font-weight: 700; }
    .rule     { fill: #3a3d45; }
    .cta      { fill: #f59e0b; font-weight: 600; }
    .link     { fill: #60a5fa; text-decoration: underline; }
    .cursor   { fill: #a78bfa; }
    .line     { opacity: 0; }
  </style>

  <rect class="bg" x="0" y="0" width="960" height="720" rx="8"/>
  <rect class="chrome stroke" x="0" y="0" width="960" height="32" rx="8"/>
  <circle cx="18" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="58" cy="16" r="6" fill="#27c93f"/>
  <text class="title" x="480" y="20" text-anchor="middle">slothdb  .ask  -  rules-first -&gt; router -&gt; local Qwen (0.5B + 1.5B) -&gt; auto-run</text>

  <g transform="translate(24, 58)">

    <!-- Open .ask -->
    <g class="line">
      <text x="0" y="0"><tspan class="prompt">slothdb&gt; </tspan><tspan class="cmd">.ask</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="22" class="muted">ask mode. Rules-first (instant, no model). Local Qwen 0.5B + 1.5B lazy-downloaded in parallel.</text>
      <text x="0" y="40" class="muted">SQL is printed, then runs. Set SLOTHDB_ASK_CONFIRM=1 for a [Y/n] prompt per statement.</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
    </g>

    <!-- Tier 1: rules, instant, catalog intent -->
    <g class="line">
      <text x="0" y="72"><tspan class="askprompt">ask&gt; </tspan>show me columns in customers</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="94" class="badge">[tier 1: rules, &lt;10 ms, no model touched]</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="116" class="muted">Customer Id    VARCHAR</text>
      <text x="0" y="132" class="muted">First Name     VARCHAR</text>
      <text x="0" y="148" class="muted">Subscription Date  VARCHAR   ...</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.25s" fill="freeze"/>
    </g>

    <!-- Tier 2: small Qwen, simple aggregate -->
    <g class="line">
      <text x="0" y="186"><tspan class="askprompt">ask&gt; </tspan>how many customers per country (also works in 29 languages)</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="208" class="badge2">[tier 2: Qwen 0.5B, ~200 ms, router picked small]</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="230"><tspan class="comment">-- </tspan><tspan class="kw">SELECT </tspan><tspan class="id">"Country"</tspan>, <tspan class="kw">COUNT</tspan>(*) <tspan class="kw">FROM </tspan><tspan class="id">customers </tspan><tspan class="kw">GROUP BY </tspan><tspan class="id">"Country"</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="252" class="ok">Norway 51 / Andorra 54 / Nepal 50 / ...  (243 rows)</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.2s" fill="freeze"/>
    </g>

    <!-- Tier 3: large Qwen, window function -->
    <g class="line">
      <text x="0" y="290"><tspan class="askprompt">ask&gt; </tspan>top 3 customers per country by subscription date</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="312" class="badge3">[tier 3: Qwen 1.5B, router picked large - "per" + analytic]</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="334"><tspan class="comment">-- </tspan><tspan class="kw">SELECT </tspan>* <tspan class="kw">FROM </tspan>(<tspan class="kw">SELECT </tspan><tspan class="id">"Country"</tspan>, <tspan class="id">"Customer Id"</tspan>,</text>
      <text x="0" y="352"><tspan class="comment">--        </tspan><tspan class="kw">ROW_NUMBER</tspan>() <tspan class="kw">OVER </tspan>(<tspan class="kw">PARTITION BY </tspan><tspan class="id">"Country" </tspan><tspan class="kw">ORDER BY </tspan><tspan class="id">"Subscription Date" </tspan><tspan class="kw">DESC</tspan>) <tspan class="kw">AS </tspan><tspan class="id">rn</tspan></text>
      <text x="0" y="370"><tspan class="comment">--      </tspan><tspan class="kw">FROM </tspan><tspan class="id">customers</tspan>) <tspan class="kw">WHERE </tspan><tspan class="id">rn </tspan>&lt;= 3</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.4s" dur="0.3s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="392" class="ok">729 rows</text>
      <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.2s" fill="freeze"/>
    </g>

    <!-- Engine-refuse for cumulative -->
    <g class="line">
      <text x="0" y="430"><tspan class="askprompt">ask&gt; </tspan>running total of customers by subscription date</text>
      <animate attributeName="opacity" from="0" to="1" begin="6.6s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="452" class="muted">refused cleanly - engine's window-frame executor has a known gap on</text>
      <text x="0" y="470" class="muted">unbounded-preceding frames; returning wrong numbers is worse than refusing.</text>
      <animate attributeName="opacity" from="0" to="1" begin="7.0s" dur="0.3s" fill="freeze"/>
    </g>

    <!-- Footer -->
    <g class="line">
      <text class="rule" x="0" y="510">=============================================================================</text>
      <animate attributeName="opacity" from="0" to="1" begin="7.6s" dur="0.2s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="534"><tspan class="cta">Rules-first </tspan>answers most shapes in &lt;10 ms.  <tspan class="cta">Router </tspan>picks 0.5B or 1.5B for the rest.</text>
      <text x="0" y="554"><tspan class="cta">Auto-run </tspan>by default (SQL printed first).  Zero egress. Zero API keys. MIT binary.</text>
      <animate attributeName="opacity" from="0" to="1" begin="7.9s" dur="0.3s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="588"><tspan class="cta">Docs: </tspan><tspan class="link">github.com/SouravRoy-ETL/slothdb/blob/main/docs/ASK.md</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="8.2s" dur="0.3s" fill="freeze"/>
    </g>
    <g class="line">
      <text x="0" y="608"><tspan class="cta">Try in browser: </tspan><tspan class="link">slothdb.org/playground</tspan><tspan class="muted">    .    </tspan><tspan class="cta">Star: </tspan><tspan class="link">github.com/SouravRoy-ETL/slothdb</tspan></text>
      <animate attributeName="opacity" from="0" to="1" begin="8.4s" dur="0.3s" fill="freeze"/>
    </g>

  </g>
</svg>
